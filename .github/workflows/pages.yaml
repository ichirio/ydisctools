name: Deploy Pages

on:
  push:
    branches: [main, master]
    paths:
      - docs/**
      - .github/workflows/pages.yaml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install docs build dependencies
        run: |
          Rscript -e "install.packages(c('ggplot2','rlang'), repos='https://cloud.r-project.org')"

      - name: Build Sankey assets for docs
        run: |
          Rscript tools/build_docs_sankey_assets.R

      - name: Build function reference HTML
        run: |
          Rscript tools/build_function_reference_html.R

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
